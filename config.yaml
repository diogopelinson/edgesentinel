edgesentinel:
  poll_interval_seconds: 5

  sensors:
    - id: cpu_temp
      type: cpu_temperature
    - id: cpu_usage
      type: cpu_usage
    - id: memory_usage
      type: memory_usage

  inference:
    enabled: true
    backend: onnx
    model_path: models/anomaly.onnx

  exporter:
    port: 8000
    use_otel: true
    backend: otlp   
    endpoint: "http://localhost:4317"
    service_name: "edgesentinel"

  cameras:
    - sensor_id: camera_01
      source: "rtsp://admin:senha@192.168.1.100:554/stream"
      name: "Camera Entrada"
      fps_limit: 1.0
      simulated: true
      simulated_mode: person

  yolo:
    enabled: true
    model_path: models/yolov8n.pt
    target_classes: [person, car, truck]
    confidence: 0.5

  rules:
    - name: alta_temperatura
      condition:
        sensor_id: cpu_temp
        operator: ">"
        threshold: 75.0
      actions: [log, webhook]
      cooldown_seconds: 60

    - name: uso_alto_cpu
      condition:
        sensor_id: cpu_usage
        operator: ">"
        threshold: 80.0
      actions: [log]
      cooldown_seconds: 30

    - name: pessoa_detectada
      condition:
        sensor_id: camera_01
        operator: anomaly      
      actions: [log, webhook]
      cooldown_seconds: 30

  actions:
    - id: log
      type: log
    - id: webhook
      type: webhook
      url: "https://webhook.site/8d1d0a84-9978-4d2d-b447-507653eecbe7"