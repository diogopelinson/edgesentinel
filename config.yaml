edgesentinel:
  poll_interval_seconds: 5

  sensors:
    - id: cpu_temp
      type: cpu_temperature
    - id: cpu_usage
      type: cpu_usage
    - id: memory_usage
      type: memory_usage

  inference:
    enabled: true
    backend: onnx
    model_path: models/anomaly.onnx

  exporter:
    port: 8000

  rules:
    - name: alta_temperatura
      condition:
        sensor_id: cpu_temp
        operator: ">"
        threshold: 75.0
      actions: [log, webhook]
      cooldown_seconds: 60

    - name: uso_alto_cpu
      condition:
        sensor_id: cpu_usage
        operator: ">"
        threshold: 80.0
      actions: [log]
      cooldown_seconds: 30

  actions:
    - id: log
      type: log
    - id: webhook
      type: webhook
      url: "https://webhook.site/8d1d0a84-9978-4d2d-b447-507653eecbe7"